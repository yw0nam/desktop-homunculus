fastapi:
  ws_url: "ws://127.0.0.1:5500/v1/chat/stream"
  rest_url: "http://127.0.0.1:5500"
  token: "<auth_token>"
  user_id: "default"
  agent_id: "yuri"
homunculus:
  api_url: "http://localhost:3100"
tts:
  reference_id: ""
reactions:
  click_phrases:
    - "やだ！びっくりした！"
    - "なぁに？"
    - "呼んだ？"
    - "どうしたの？"
  idle_phrases:
    - "退屈だなぁ..."
    - "ねぇ、遊ぼうよ！"
    - "もしかして忘れてる？"
    - "ずっと待ってたんだよ？"
  window_phrases:
    - "{title}を使ってるんだ！"
    - "あっ、{title}！"
    - "{title}か～、頑張ってね！"
  idle_timeout_ms: 300000
  window_check_interval_ms: 10000
